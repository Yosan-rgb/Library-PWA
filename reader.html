<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reader</title>
  <meta name="theme-color" content="#ffffff" id="theme-color-meta">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /> <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
 <!-- also loaded in epub.js but keeping here just in case --> <script src="js/epub.js"></script>
  
 <link rel="stylesheet" href="css.css">
  <style>
    body {
      margin: 0;
      background: #fff;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    .reader-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      transition: opacity 0.35s ease, transform 0.35s ease;}


    .reader-header.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-100%);
    
     }.reader-header__back {
      background: none; border: none;
      color: var(--accent); font-size: 16px;
      font-weight: 500; cursor: pointer;
      padding: 0; width: auto;}
   
    .reader-header__title {
      font-size: 14px; font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 45%;
      position: absolute; left: 50%;
      transform: translateX(-50%);
    }
    .reader-header__actions {
      display: flex; gap: 14px; align-items: center;
    }
    .reader-header__actions button {
      background: none; border: none;
      color: var(--accent); font-size: 22px;
      cursor: pointer; padding: 0; width: auto;
      line-height: 1;
   }

    #viewer {
      position: fixed;
      top: 0; bottom: 0; left: 0; right: 0;
    }

    .reader-footer {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 99px;
      padding: 7px 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.13);
      z-index: 100;
      transition: opacity 0.35s ease, transform 0.35s ease;
      width: auto;
      max-width: 260px;
    }
    .reader-footer.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(16px);
     }
    .prev-btn, .next-btn {
      background: none; border: none;
      color: var(--accent); font-size: 20px;
      cursor: pointer; padding: 0;
      width: auto; line-height: 1;
      flex-shrink: 0;
    }
    


    .reader-page-info {
  font-size: 12px;
  color: #8e8e93;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 60px;
  text-align: center;
}

.reader-header__back {
  background: none !important;
  border: none !important;
  color: var(--accent) !important;
  font-size: 16px !important;
  font-weight: 500 !important;
  cursor: pointer !important;
  padding: 0 !important;
  width: auto !important;
  outline: none !important;
}

    
    #settings-panel { display: none; }
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 200;
    }
    #settings-drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-color, #f2f2f7);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 48px;
      z-index: 201;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    .settings-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px; color: #8e8e93;
      margin-bottom: 12px; margin-top: 20px;
    }
    .settings-label:first-child { margin-top: 0; }
    .settings-row { display: flex; gap: 10px; margin-bottom: 4px; }
    .toggle-btn {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      background: #fff; color: #1a1a1a;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active {
      background: var(--accent); color: #1a1a1a;
      border-color: var(--accent);
    }
    .font-size-row {
      display: flex; align-items: center; gap: 16px;}


    .font-size-row button {
      background: #fff; border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px; color: #1a1a1a; font-size: 18px;
      width: 44px; height: 44px; cursor: pointer; font-weight: 600;
    }
    #font-size-label {
      flex: 1; text-align: center;
      font-size: 15px; color: #1a1a1a;
    }


    #search-bar {
      display: none;
      position: fixed; top: 44px; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      padding: 10px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      z-index: 99;
      backdrop-filter: blur(16px);
    }
    #search-bar input {
      width: 100%; padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      background: #f2f2f7; color: #1a1a1a;
      font-size: 15px; margin-bottom: 0;
    }
    
    #search-results {
      max-height: 200px; overflow-y: auto; margin-top: 8px;
    }

    .search-result-item {
      padding: 10px 12px; font-size: 13px; color: #1a1a1a;
      border-bottom: 0.5px solid rgba(0,0,0,0.08); cursor: pointer;
      line-height: 1.4;
    }

    #bookmarks-panel { display: none; }
    #bookmarks-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 300;
    }
    #bookmarks-drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-color, #f2f2f7);
      border-radius: 20px 20px 0 0;
      max-height: 70vh; overflow-y: auto;
      z-index: 301;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    #bookmarks-header {
      padding: 20px; border-bottom: 0.5px solid rgba(0,0,0,0.08);
      font-size: 17px; font-weight: 600; color: #1a1a1a;
      position: sticky; top: 0;
      background: var(--bg-color, #f2f2f7);
    }

    #highlights-panel { display: none; }
    #highlights-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 300;
    }
    #highlights-drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-color, #f2f2f7);
      border-radius: 20px 20px 0 0;
      max-height: 70vh; overflow-y: auto;
      z-index: 301;
      border-top: 0.5px solid rgba(0,0,0,0.08);
    }
    #highlights-header {
      padding: 20px; border-bottom: 0.5px solid rgba(0,0,0,0.08);
      font-size: 17px; font-weight: 600; color: #1a1a1a;
      position: sticky; top: 0;
      background: var(--bg-color, #f2f2f7);
    }
  </style>
</head>
<body>

  <div class="reader-header" id="reader-header">
    <button class="reader-header__back" onclick="window.location.href='index.html'">‹ Library</button>
    <span class="reader-header__title" id="book-title"></span>
    <div class="reader-header__actions">
      <button id="search-btn" title="Search">⌕</button>
      <!-- <button id="toc-btn">≡</button> tried a separate toc button here, moved it to settings -->
      <button id="bookmark-btn" title="Bookmark this page">🏷</button>
      <!--<button id="share-btn">↑</button> -->
      <button id="settings-btn" title="More">⋯</button>
    </div>
  </div>

  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search in book…">
    <div id="search-results"></div>
  </div>

<div id="viewer" style="position:fixed;top:0;bottom:0;left:0;right:0;z-index:0;"></div>
<div id="tap-overlay" style="position:fixed;top:0;bottom:0;left:0;right:0;z-index:1;display:flex;">
  <div id="tap-left"  style="flex:1;"></div>
  <div id="tap-mid"   style="flex:1;"></div>
  <div id="tap-right" style="flex:1;"></div>

  <div id="tap-overlay" style="position:fixed;top:0;bottom:0;left:0;right:0;z-index:1;display:flex;pointer-events:none;">
  <div id="tap-left"  style="flex:1;"></div>
  <div id="tap-mid"   style="flex:1;"></div>
  <div id="tap-right" style="flex:1;"></div>

</div>
  <div class="reader-footer" id="reader-footer">
  <button class="prev-btn" id="prev-btn">‹</button>
  <!-- <div id="progress-bar" style="flex:1;height:3px;background:#eee;border-radius:99px;">
    <div id="progress-fill" style="height:100%;background:var(--accent);width:0%;border-radius:99px;"></div>
  </div> -->
  <!-- tried a progress bar here but it was too hard to read at small size -->
  <span class="reader-page-info" id="page-info">p. —</span>
  <button class="next-btn" id="next-btn">›</button>
</div>
  <div id="overlay-base"></div>
<!-- base overlay layer - might use this later -->

  <div id="settings-panel">
    <div id="settings-overlay"></div>
    <div id="settings-drawer">
      <p class="settings-label">Reading Mode</p>
      <div class="settings-row">
        <button id="mode-pagebypage" class="toggle-btn">Page Turn</button>
        <button id="mode-scroll" class="toggle-btn active">Scroll</button>
      </div>
      <p class="settings-label">Theme</p>
      <div class="settings-row">
        <button id="theme-light" class="toggle-btn active">Light</button>
        <button id="theme-sepia" class="toggle-btn">Sepia</button>
        <button id="theme-dark" class="toggle-btn">Dark</button>
      </div>
      <p class="settings-label">Font Size</p>
      <div class="font-size-row">
        <button id="font-decrease">A−</button>
        <span id="font-size-label">100%</span>
        <button id="font-increase">A+</button>
      </div>
      <p class="settings-label" style="margin-top:28px;">Font Style</p>
      <div class="settings-row">
        <button id="font-sans" class="toggle-btn active">Sans</button>
        <button id="font-serif" class="toggle-btn">Serif</button>
        <button id="font-mono" class="toggle-btn">Mono</button>
      </div>
      <p class="settings-label">More</p>
      <div class="settings-row">
        <button class="toggle-btn" id="open-bookmarks-btn">Bookmarks</button>
        <button class="toggle-btn" id="open-highlights-btn">Highlights</button>
      </div>
      <div class="settings-row" style="margin-top:10px;">
        <button class="toggle-btn" id="open-toc-btn">Table of Contents</button>
      </div>
    </div>
  </div>

  <div id="bookmarks-panel">
    <div id="bookmarks-overlay"></div>
    <div id="bookmarks-drawer">
      <div id="bookmarks-header">Bookmarks</div>
      <div id="bookmarks-list"></div>
    </div>
  </div>

  <div id="highlights-panel">
    <div id="highlights-overlay"></div>
    <div id="highlights-drawer">
      <div id="highlights-header">
        <span>Highlights</span>
        <!-- <button style="float:right;font-size:13px;">Clear all</button> -->
      </div>
      <div id="highlights-list"></div>
    </div>
  </div>

  <style>
    /*fix for the footer overlapping content on older iphones */
    .reader-footer { margin-bottom: env(safe-area-inset-bottom); }
  </style>
  <script type="module" src="js/reader.js"></script>
</body>
</html>
